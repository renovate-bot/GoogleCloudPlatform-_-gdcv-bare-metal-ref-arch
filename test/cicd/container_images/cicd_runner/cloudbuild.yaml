images:
  - ${LOCATION}-docker.pkg.dev/${PROJECT_ID}/cicd/runner:latest

options:
  automapSubstitutions: true
  logging: CLOUD_LOGGING_ONLY

steps:
  - args:
      - "${_WAIT_FOR_TRIGGER}"
    entrypoint: "test/cicd/scripts/cloudbuild/wait_for_triggers.sh"
    env:
      - "LOCATION=${LOCATION}"
      - "PROJECT_ID=${PROJECT_ID}"
    id: "Check triggers"
    name: "gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine"
    waitFor: ["-"]

  - args:
      - build
      - --build-arg=AR_LOCATION=${LOCATION}
      - --build-arg=AR_PROJECT_ID=${PROJECT_ID}
      - --build-context=my_context=test/cicd/container_images/cicd_runner/context
      - --tag=${LOCATION}-docker.pkg.dev/${PROJECT_ID}/cicd/runner:latest
      - --file=test/cicd/container_images/cicd_runner/Dockerfile
      - .
    id: "Build CI/CD runner image"
    name: "${LOCATION}-docker.pkg.dev/${PROJECT_ID}/cicd/docker-builder:latest"
    waitFor:
      - "Check triggers"
