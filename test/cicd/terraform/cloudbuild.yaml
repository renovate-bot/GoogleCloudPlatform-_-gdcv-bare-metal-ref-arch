options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - args:
      - "${_WAIT_FOR_TRIGGER}"
    entrypoint: "test/cicd/scripts/cloudbuild/wait_for_triggers.sh"
    env:
      - "LOCATION=${LOCATION}"
      - "PROJECT_ID=${PROJECT_ID}"
    id: "Check triggers"
    name: "gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine"
    waitFor: ["-"]

  - name: "${LOCATION}-docker.pkg.dev/${PROJECT_ID}/cicd/runner:latest"
    id: "Apply GoogleCloudPlatform/gdc-solutions CI/CD Terraform"
    entrypoint: "ash"
    args:
      - "-x"
      - "-c"
      - |
        set -o errexit
        set -o nounset
        set -o pipefail

        export NO_COLOR="1"
        export TERM="xterm"
        export TF_CLI_ARGS="-no-color"
        export TF_IN_AUTOMATION="1"

        test/cicd/terraform/apply.sh
    waitFor:
      - "Check triggers"

timeout: 90m
